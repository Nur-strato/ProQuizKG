{% extends 'base.html' %}

{% block title %}Edit | Панель админа{% endblock %}

{% block body %}
<div style="max-width: 600px; margin: 40px auto; padding: 30px; background: var(--card-bg); border-radius: var(--radius); border: 1px solid rgba(0,0,0,0.08);">
    
    <div style="margin-bottom: 20px;">
        <a href="{{ url_for('universities') }}" style="color: #0083e4; text-decoration: none; font-weight: 700; font-size: 0.9rem;">
            ← Отмена и назад к списку
        </a>
    </div>

    <h1 style="color: var(--navy); font-size: 1.6rem; margin-bottom: 25px; font-weight: 800;">📝 Edit</h1>
    
    <form method="POST" action="{{ url_for('admin_quick_edit_university', id=university.id) }}">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--navy);">Name of the university:</label>
            <input type="text" name="name" value="{{ university.name }}" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--navy);">Город:</label>
            <input type="text" name="city" value="{{ university.city }}" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;">
        </div>

       <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--navy);">Короткое описание для КАРТОЧКИ в списке:</label>
            <textarea name="short_description" rows="3" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; resize: vertical; font-family: inherit;">{{ university.short_description if university.short_description else '' }}</textarea>
        </div>

        <div style="margin-bottom: 25px; display: flex; gap: 20px;">
             <label style="display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--navy); cursor: pointer;">
                  <input type="checkbox" name="is_host" style="width: 18px; height: 18px; cursor: pointer;" {% if university.is_host %}checked{% endif %}>
                  Set the HOST tag 🏢
             </label>

             <label style="display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--navy); cursor: pointer;">
                  <input type="checkbox" name="is_sponsor" style="width: 18px; height: 18px; cursor: pointer;" {% if university.is_sponsor %}checked{% endif %}>
                  Set the SPONSOR tag 💰
            </label>
        </div>

        <button type="submit" style="background: #22c55e; color: white; border: none; padding: 14px 24px; font-size: 1rem; font-weight: 700; border-radius: 6px; cursor: pointer; width: 100%;">
            Обновить карточку в списке
        </button>
    </form>
</div>
{% endblock %}
